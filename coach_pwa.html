<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1a10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="COACH">
<meta name="application-name" content="COACH">
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22COACH%20%E2%80%94%20Marcus%22%2C%22short_name%22%3A%22COACH%22%2C%22description%22%3A%22Plano%20de%20corrida%20Marcus%20Voloch%202026%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a1a10%22%2C%22theme_color%22%3A%22%230a1a10%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%2520viewBox%3D'0%25200%2520512%2520512'%253E%253Crect%2520width%3D'512'%2520height%3D'512'%2520fill%3D'%25230a1a10'%2520rx%3D'80'%2F%253E%253Ctext%2520x%3D'256'%2520y%3D'340'%2520font-family%3D'Arial'%2520font-size%3D'220'%2520font-weight%3D'bold'%2520fill%3D'%252376B746'%2520text-anchor%3D'middle'%253EC%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
<title>COACH — Marcus</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%230a1a10' rx='80'/><text x='256' y='340' font-family='Arial' font-size='220' font-weight='bold' fill='%2376B746' text-anchor='middle'>C</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a1a10;
  --surf:    #0f2318;
  --bdr:     #1a3a22;
  --green:   #76B746;
  --gdim:    #3A6B1F;
  --white:   #f0f5f1;
  --muted:   #4a6a52;
  --warn:    #e8a020;
  --danger:  #e05040;
  --fast:    #e05040;
  --slow:    #40c4d4;
  --ok:      #76B746;
  --mono:    'Space Mono', monospace;
  --disp:    'Bebas Neue', sans-serif;
  --body:    'DM Sans', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:var(--body);touch-action:manipulation}
.screen{display:none;height:100vh;flex-direction:column}
#workout,#done{overflow:hidden}
.screen.active{display:flex}

/* ── HOME ── */
#home{background:radial-gradient(ellipse at 30% 20%,#1a3a22,#0a1a10 60%);justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-top{padding:44px 28px 16px}
.home-top .lbl{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.home-top h1{font-family:var(--disp);font-size:54px;letter-spacing:2px;color:var(--green);line-height:1}
.home-top .sub{font-size:13px;color:var(--muted);margin-top:4px;font-weight:300}
.week-sel{padding:0 28px;flex:1;display:flex;flex-direction:column;justify-content:center;gap:10px}
.week-row{display:flex;align-items:center;gap:12px}
.wlbl{font-family:var(--mono);font-size:11px;color:var(--muted);width:52px}
.week-nav{display:flex;align-items:center;background:var(--surf);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.week-nav button{background:none;border:none;color:var(--green);font-size:20px;width:44px;height:44px;cursor:pointer;font-family:var(--mono)}
.week-nav button:active{background:var(--bdr)}
#wdisp{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--white);min-width:52px;text-align:center}
.cards{padding:0 28px 8px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .15s}
.card:active,.card.sel{border-color:var(--green);background:#0f2a18}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cday{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.cname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.cmeta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.carr{color:var(--green);font-size:18px;opacity:.5}
.start-btn{margin:12px 28px 40px;background:var(--green);color:#0a1a10;border:none;border-radius:14px;padding:18px;font-family:var(--disp);font-size:22px;letter-spacing:2px;width:calc(100% - 56px);cursor:pointer;transition:opacity .2s,transform .1s;flex-shrink:0;position:sticky;bottom:0}
.start-btn:active{transform:scale(.98);opacity:.9}
.start-btn:disabled{background:var(--bdr);color:var(--muted)}

/* ── WORKOUT ── */
#workout{background:var(--bg);position:relative;overflow:hidden}
.wring{position:absolute;border-radius:50%;border:1px solid var(--bdr);pointer-events:none}
.wring:nth-child(1){width:300px;height:300px;top:-80px;right:-80px;opacity:.35}
.wring:nth-child(2){width:500px;height:500px;top:-160px;right:-160px;opacity:.15}

.whdr{padding:24px 24px 12px;display:flex;align-items:flex-start;justify-content:space-between;position:relative;z-index:2}
.whdr-l .wlabel{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.whdr-l .wname{font-family:var(--disp);font-size:26px;letter-spacing:1px;color:var(--white);line-height:1.1;max-width:220px}
.stop-btn{background:none;border:1px solid var(--bdr);color:var(--muted);border-radius:8px;padding:8px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:1px}
.stop-btn:active{border-color:var(--danger);color:var(--danger)}

.prog-wrap{padding:0 24px;position:relative;z-index:2}
.prog-track{height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear;width:0%}
.prog-txt{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between}

/* GPS bar */
.gps-bar{margin:8px 24px 0;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;position:relative;z-index:2}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.gps-dot.ok{background:var(--ok)}
.gps-dot.pulse{animation:gps-pulse 1.5s infinite}
@keyframes gps-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.gps-vals{display:flex;gap:16px;flex:1;align-items:center}
.gps-item{text-align:center}
.gps-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--white)}
.gps-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:1px}

/* Pace indicator */
.pace-ind{display:flex;align-items:center;gap:6px;margin-left:auto}
.pace-arrow{font-size:20px;font-weight:700;transition:color .3s}
.pace-arrow.fast{color:var(--fast)}
.pace-arrow.slow{color:var(--slow)}
.pace-arrow.ok{color:var(--ok)}
.pace-status{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase}
.pace-status.fast{color:var(--fast)}
.pace-status.slow{color:var(--slow)}
.pace-status.ok{color:var(--ok)}

/* Current block */
.cur-block{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 24px;position:relative;z-index:2}
.blk-badge{font-family:var(--mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:5px 12px;border-radius:20px;margin-bottom:12px;border:1px solid}

/* Speed display: target + real side by side */
.speed-row{display:flex;align-items:flex-end;gap:20px;margin-bottom:4px}
.speed-target{text-align:center}
.speed-target-lbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
.speed-target-val{font-family:var(--disp);font-size:80px;line-height:1;letter-spacing:-2px;color:var(--green)}
.speed-target-unit{font-family:var(--mono);font-size:13px;color:var(--muted)}

.speed-divider{font-family:var(--mono);font-size:28px;color:var(--bdr);margin-bottom:16px}

.speed-real{text-align:center}
.speed-real-lbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
.speed-real-val{font-family:var(--disp);font-size:52px;line-height:1;letter-spacing:-1px;transition:color .4s;color:var(--muted)}
.speed-real-val.fast{color:var(--fast)}
.speed-real-val.slow{color:var(--slow)}
.speed-real-val.ok{color:var(--ok)}
.speed-real-unit{font-family:var(--mono);font-size:12px;color:var(--muted)}

.blk-desc{font-size:13px;color:var(--muted);margin-top:4px;text-align:center;max-width:240px;line-height:1.5}

/* Timer ring */
.timer-wrap{position:relative;margin:12px 0 6px}
.timer-wrap svg{transform:rotate(-90deg)}
.trk{fill:none;stroke:var(--bdr);stroke-width:4}
.tfill{fill:none;stroke:var(--green);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.ttext{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.tsec{font-family:var(--disp);font-size:38px;letter-spacing:1px;color:var(--white);line-height:1}
.tlbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}

/* Next */
.next-row{margin:0 24px 12px;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;position:relative;z-index:2}
.nlbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;width:32px;flex-shrink:0}
.nname{font-size:13px;font-weight:500}
.nspd{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}

/* Step dots */
.step-dots{display:flex;justify-content:center;gap:6px;padding:0 24px 24px;position:relative;z-index:2;flex-wrap:wrap}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--bdr);transition:background .3s,transform .3s}
.sdot.done{background:var(--gdim)}
.sdot.cur{background:var(--green);transform:scale(1.5)}

/* Transition overlay */
#toverlay{position:fixed;inset:0;background:var(--green);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
#toverlay.show{opacity:1;pointer-events:all}
.t-big{font-family:var(--disp);font-size:80px;color:#0a1a10;letter-spacing:2px}
.t-sub{font-family:var(--mono);font-size:13px;color:#0f2318;margin-top:6px;letter-spacing:2px}

/* Done */
#done{background:radial-gradient(ellipse at 50% 40%,#1a3a22,#0a1a10 70%);align-items:center;justify-content:center;text-align:center;padding:40px 32px;gap:14px}
.done-ico{font-size:60px;line-height:1}
.done-ttl{font-family:var(--disp);font-size:46px;letter-spacing:2px;color:var(--green)}
.done-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-top:4px}
.dstat{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:14px 10px}
.dval{font-family:var(--disp);font-size:26px;color:var(--green);letter-spacing:1px}
.dlbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:3px}
.done-back{background:var(--green);color:#0a1a10;border:none;border-radius:14px;padding:16px 40px;font-family:var(--disp);font-size:22px;letter-spacing:2px;cursor:pointer;margin-top:4px;width:100%}

/* Type colors */
.type-BASE        {color:#76B746;border-color:#3A6B1F;background:#0f2318}
.type-REGENERATIVO{color:#52b87a;border-color:#1a5a3a;background:#0a2018}
.type-CADÊNCIA    {color:#40c4d4;border-color:#1a4a5a;background:#081820}
.type-FARTLEK     {color:#e8a020;border-color:#5a4010;background:#201808}
.type-TEMPO       {color:#f0d040;border-color:#5a5010;background:#201c08}
.type-TIRO        {color:#e05040;border-color:#5a2018;background:#200808}
.type-LONGO       {color:#a080e0;border-color:#4a2880;background:#180820}
.type-METABÓLICO  {color:#e07860;border-color:#5a3020;background:#200f08}
.type-DESCANSO    {color:#606060;border-color:#303030;background:#101010}
.type-PROVA       {color:#76B746;border-color:#76B746;background:#0f2318}
.dot-BASE         {background:#76B746}
.dot-REGENERATIVO {background:#52b87a}
.dot-CADÊNCIA     {background:#40c4d4}
.dot-FARTLEK      {background:#e8a020}
.dot-TEMPO        {background:#f0d040}
.dot-TIRO         {background:#e05040}
.dot-LONGO        {background:#a080e0}
.dot-METABÓLICO   {background:#e07860}
.dot-DESCANSO     {background:#606060}
.dot-PROVA        {background:#76B746}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-top">
    <div class="lbl">Running Coach</div>
    <h1>COACH</h1>
    <div class="sub">Marcus Voloch — Plano 2026</div>
  </div>
  <div class="week-sel">
    <div class="week-row">
      <span class="wlbl">SEMANA</span>
      <div class="week-nav">
        <button onclick="changeWeek(-1)">−</button>
        <span id="wdisp">1</span>
        <button onclick="changeWeek(1)">+</button>
      </div>
    </div>
  </div>
  <div class="cards" id="cards"></div>
  <button class="start-btn" id="start-btn" onclick="startWorkout()" disabled>INICIAR TREINO</button>
</div>

<!-- WORKOUT -->
<div id="workout" class="screen">
  <div class="wring"></div><div class="wring"></div>
  <div class="whdr">
    <div class="whdr-l">
      <div class="wlabel" id="w-wlbl">SEMANA 1 · TERÇA</div>
      <div class="wname" id="w-name">BASE</div>
    </div>
    <button class="stop-btn" onclick="stopWorkout()">PARAR</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-txt">
      <span id="prog-done">0 / 0 blocos</span>
      <span id="prog-elapsed">00:00</span>
    </div>
  </div>

  <!-- GPS bar -->
  <div class="gps-bar">
    <div class="gps-dot" id="gps-dot"></div>
    <div class="gps-vals">
      <div class="gps-item">
        <div class="gps-val" id="gps-speed">—</div>
        <div class="gps-lbl">km/h real</div>
      </div>
      <div class="gps-item">
        <div class="gps-val" id="gps-pace">—</div>
        <div class="gps-lbl">pace real</div>
      </div>
      <div class="gps-item">
        <div class="gps-val" id="gps-dist">0.00</div>
        <div class="gps-lbl">km total</div>
      </div>
    </div>
    <div class="pace-ind">
      <div class="pace-arrow ok" id="pace-arrow">→</div>
      <div class="pace-status ok" id="pace-status">NO ALVO</div>
    </div>
  </div>

  <div class="cur-block">
    <div class="blk-badge" id="blk-badge">BASE</div>

    <div class="speed-row">
      <!-- Target speed -->
      <div class="speed-target">
        <div class="speed-target-lbl">alvo</div>
        <div class="speed-target-val" id="tgt-speed">9.0</div>
        <div class="speed-target-unit">km/h</div>
      </div>

      <div class="speed-divider">|</div>

      <!-- Real speed from GPS -->
      <div class="speed-real">
        <div class="speed-real-lbl">atual</div>
        <div class="speed-real-val" id="real-speed">—</div>
        <div class="speed-real-unit">km/h</div>
      </div>
    </div>

    <div class="blk-desc" id="blk-desc">Aguardando GPS...</div>

    <div class="timer-wrap">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle class="trk" cx="55" cy="55" r="50"/>
        <circle class="tfill" id="tring" cx="55" cy="55" r="50"
          stroke-dasharray="314.2" stroke-dashoffset="0"/>
      </svg>
      <div class="ttext">
        <div class="tsec" id="tsec">0:00</div>
        <div class="tlbl">restam</div>
      </div>
    </div>
  </div>

  <div class="next-row" id="next-row">
    <div class="nlbl">PRÓX</div>
    <div>
      <div class="nname" id="next-name">—</div>
      <div class="nspd" id="next-spd">—</div>
    </div>
  </div>

  <div class="step-dots" id="sdots"></div>
</div>

<!-- DONE -->
<div id="done" class="screen">
  <div class="done-ico">✓</div>
  <div class="done-ttl">TREINO<br>CONCLUÍDO</div>
  <div class="done-stats">
    <div class="dstat"><div class="dval" id="d-dur">00:00</div><div class="dlbl">Duração</div></div>
    <div class="dstat"><div class="dval" id="d-dist">0.00</div><div class="dlbl">km (GPS)</div></div>
    <div class="dstat"><div class="dval" id="d-pace">—</div><div class="dlbl">Pace médio</div></div>
    <div class="dstat"><div class="dval" id="d-week">S1</div><div class="dlbl">Semana</div></div>
  </div>
  <button class="done-back" onclick="goHome()">VOLTAR</button>
</div>

<!-- TRANSITION -->
<div id="toverlay">
  <div class="t-big" id="t-spd">9.0</div>
  <div class="t-sub" id="t-desc">km/h</div>
</div>

<script>
// ── PLAN DATA (same as v1, condensed) ────────────────────────────────────────
function rep(n,steps){const o=[];for(let i=0;i<n;i++)o.push(...steps);return o}
const PLAN={};
function add(s,d,t,n,steps){if(!PLAN[s])PLAN[s]=[];PLAN[s].push({day:d,type:t,name:n,steps})}

// FASE 1
add(1,'SEG','METABÓLICO','Metabólico Incl 6%',[{name:'Aquecimento',duration:300,speed:5.5,intensity:'WARMUP'},{name:'Metabólico 6,0km/h — Incl 6%',duration:2100,speed:6.0,intensity:'ACTIVE'},{name:'Esfriamento',duration:300,speed:5.0,intensity:'COOLDOWN'}]);
add(1,'TER','BASE','Base — 1min/2min × 8',[{name:'Aquecimento',duration:300,speed:5.5,intensity:'WARMUP'},...rep(8,[{name:'Correr 9,0 km/h',duration:60,speed:9.0,intensity:'ACTIVE'},{name:'Andar 6,0 km/h',duration:120,speed:6.0,intensity:'RECOVERY'}]),{name:'Esfriamento',duration:300,speed:5.5,intensity:'COOLDOWN'}]);
add(1,'QUI','CADÊNCIA','Cadência 170spm',[{name:'Aquecimento',duration:300,speed:6.0,intensity:'WARMUP'},{name:'Cadência 170spm — 7,0km/h',duration:2100,speed:7.0,intensity:'ACTIVE'},{name:'Esfriamento',duration:300,speed:6.0,intensity:'COOLDOWN'}]);
add(1,'SÁB','LONGO','Longo 5km Calçadão',[{name:'Caminhada',duration:600,speed:6.0,intensity:'WARMUP'},...rep(3,[{name:'Correr 9,0 km/h',duration:120,speed:9.0,intensity:'ACTIVE'},{name:'Andar 6,0 km/h',duration:300,speed:6.0,intensity:'RECOVERY'}]),{name:'Esfriamento',duration:600,speed:6.0,intensity:'COOLDOWN'}]);

let cWeek=1, selIdx=null, active=false;
let stepIdx=0, stepRemain=0, totalElapsed=0, timerIv=null;

let totalDur=0;

const SPEED_TOL=0.8; // km/h tolerance for "on target"

const DAY_ORDER=['SEG','TER','QUI','SÁB'];
const DAY_FULL={SEG:'SEGUNDA',TER:'TERÇA',QUI:'QUINTA',SÁB:'SÁBADO'};

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let actx=null;
function beep(f=880,d=0.15,v=0.4){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);
    o.start();o.stop(actx.currentTime+d);
  }catch(e){}
}
function alertChange(){
  beep(660,.1);setTimeout(()=>beep(880,.15),130);setTimeout(()=>beep(1100,.25),280);
  if(navigator.vibrate)navigator.vibrate([100,50,100,50,200]);
}
function alertWarn(){beep(440,.08);if(navigator.vibrate)navigator.vibrate(80)}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}
function typeColor(t){return{BASE:'#76B746',REGENERATIVO:'#52b87a',CADÊNCIA:'#40c4d4',FARTLEK:'#e8a020',TEMPO:'#f0d040',TIRO:'#e05040',LONGO:'#a080e0',METABÓLICO:'#e07860',DESCANSO:'#606060',PROVA:'#76B746'}[t]||'#76B746'}
function getSorted(){return[...(PLAN[cWeek]||[])].sort((a,b)=>DAY_ORDER.indexOf(a.day)-DAY_ORDER.indexOf(b.day))}

// ── GPS ───────────────────────────────────────────────────────────────────────
function startGPS(){
  if(!navigator.geolocation){updateGPSUI(false,'Sem GPS');return}
  const dot=document.getElementById('gps-dot');
  dot.classList.add('pulse');
  gpsWatch=navigator.geolocation.watchPosition(
    pos=>{
      dot.classList.remove('pulse');
      dot.classList.add('ok');
      const spd=pos.coords.speed!=null?(pos.coords.speed*3.6):null;
      if(spd!=null){
        speedBuffer.push(spd);
        if(speedBuffer.length>4)speedBuffer.shift();
        realSpeed=speedBuffer.reduce((a,b)=>a+b,0)/speedBuffer.length;
      }
      if(lastPos&&active){
        const d=haversine(lastPos.coords.latitude,lastPos.coords.longitude,pos.coords.latitude,pos.coords.longitude);
        totalDist+=d;
        document.getElementById('gps-dist').textContent=totalDist.toFixed(2);
      }
      lastPos=pos;
      updateGPSValues(realSpeed);
    },
    err=>{dot.classList.remove('ok');updateGPSUI(false,'GPS: '+err.message)},
    {enableHighAccuracy:true,maximumAge:1000,timeout:10000}
  );
}

function stopGPS(){if(gpsWatch!=null){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null}}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function updateGPSUI(ok,msg){
  if(!ok){document.getElementById('gps-speed').textContent='—';document.getElementById('gps-pace').textContent=msg||'—'}
}

function updateGPSValues(spd){
  document.getElementById('gps-speed').textContent=spd.toFixed(1);
  const paceSecPerKm=spd>0.5?3600/spd:null;
  document.getElementById('gps-pace').textContent=paceSecPerKm?fmt(Math.round(paceSecPerKm)):'—';
  document.getElementById('real-speed').textContent=spd.toFixed(1);

  // Pace indicator vs target
  const tgt=PLAN[cWeek]?.[stepIdx]?.speed||0;
  updatePaceIndicator(spd,tgt);
}

function updatePaceIndicator(real,tgt){
  if(!active||tgt===0){setPaceStatus('ok','→','NO ALVO');return}
  const diff=real-tgt;
  if(Math.abs(diff)<=SPEED_TOL) setPaceStatus('ok','→','NO ALVO');
  else if(diff>SPEED_TOL)       setPaceStatus('fast','↑','RÁPIDO');
  else                           setPaceStatus('slow','↓','LENTO');
  document.getElementById('real-speed').className='speed-real-val '+(Math.abs(diff)<=SPEED_TOL?'ok':diff>0?'fast':'slow');
}

function setPaceStatus(cls,arrow,txt){
  const a=document.getElementById('pace-arrow'),s=document.getElementById('pace-status');
  a.className='pace-arrow '+cls;a.textContent=arrow;
  s.className='pace-status '+cls;s.textContent=txt;
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function changeWeek(d){cWeek=Math.max(1,Math.min(38,cWeek+d));selIdx=null;renderHome()}

function renderHome(){
  document.getElementById('wdisp').textContent=cWeek;
  const sorted=getSorted();
  document.getElementById('cards').innerHTML=sorted.map((s,i)=>`
    <div class="card ${selIdx===i?'sel':''}" onclick="selSession(${i})">
      <div class="cdot dot-${s.type}"></div>
      <div class="cinfo">
        <div class="cday">${DAY_FULL[s.day]||s.day}</div>
        <div class="cname">${s.name}</div>
        <div class="cmeta">${s.steps.length} blocos · ${fmt(s.steps.reduce((a,b)=>a+b.duration,0))}</div>
      </div>
      <div class="carr">›</div>
    </div>`).join('');
  document.getElementById('start-btn').disabled=selIdx===null;
}

function selSession(i){selIdx=i;renderHome();document.getElementById('start-btn').disabled=false}

// ── WORKOUT ───────────────────────────────────────────────────────────────────
function startWorkout(){
  const session=getSorted()[selIdx];
  if(!session)return;
  active=true;stepIdx=0;stepRemain=0;totalElapsed=0;totalDist=0;lastPos=null;
  realSpeed=0;speedBuffer.length=0;
  totalDur=session.steps.reduce((a,b)=>a+b.duration,0);

  document.getElementById('w-wlbl').textContent=`SEMANA ${cWeek} · ${DAY_FULL[session.day]||session.day}`;
  document.getElementById('w-name').textContent=session.name;

  // Dots
  document.getElementById('sdots').innerHTML=session.steps.map((_,i)=>`<div class="sdot ${i===0?'cur':''}" id="sd${i}"></div>`).join('');

  show('workout');
  startGPS();
  loadStep(session,0);
  startTimer(session);

  if('wakeLock' in navigator)navigator.wakeLock.request('screen').catch(()=>{});
  // Announce workout start
  const s0 = getSorted()[selIdx];
  if(s0) setTimeout(()=>{
    speak(`Treino iniciado. ${s0.name}. ${s0.steps.length} blocos.`);
    setTimeout(()=>speak(stepSpeech(s0.steps[0])), 2500);
  }, 500);
}

function loadStep(session,idx){
  const step=session.steps[idx];
  if(!step){finishWorkout(session);return}
  stepIdx=idx;stepRemain=step.duration;

  const type=session.type;
  const badge=document.getElementById('blk-badge');
  badge.textContent=step.intensity==='WARMUP'?'AQUECIMENTO':step.intensity==='COOLDOWN'?'ESFRIAMENTO':step.intensity==='RECOVERY'?'RECUPERAÇÃO':type;
  badge.className='blk-badge type-'+type;

  document.getElementById('tgt-speed').textContent=step.speed.toFixed(1);
  document.getElementById('blk-desc').textContent=step.name;

  const color=typeColor(type);
  const ring=document.getElementById('tring');
  ring.style.stroke=step.intensity==='RECOVERY'?'#3A6B1F':step.intensity==='WARMUP'||step.intensity==='COOLDOWN'?'#1a4a5a':color;
  ring.style.strokeDashoffset='0';

  const next=session.steps[idx+1];
  if(next){
    document.getElementById('next-name').textContent=next.name;
    document.getElementById('next-spd').textContent=`${next.speed.toFixed(1)} km/h · ${fmt(next.duration)}`;
    document.getElementById('next-row').style.opacity='1';
  } else {
    document.getElementById('next-name').textContent='Fim do treino';
    document.getElementById('next-spd').textContent='';
    document.getElementById('next-row').style.opacity='.4';
  }

  session.steps.forEach((_,i)=>{
    const d=document.getElementById(`sd${i}`);
    if(d)d.className='sdot'+(i<idx?' done':i===idx?' cur':'');
  });

  updateTimer(step.duration,step.duration);
  updatePaceIndicator(realSpeed,step.speed);
}

function updateTimer(remain,total){
  document.getElementById('tsec').textContent=fmt(Math.max(0,remain));
  const pct=total>0?remain/total:0;
  document.getElementById('tring').style.strokeDashoffset=String(314.2*(1-pct));
}

function startTimer(session){
  clearInterval(timerIv);
  timerIv=setInterval(()=>{
    if(!active)return;
    totalElapsed++;stepRemain--;
    document.getElementById('prog-elapsed').textContent=fmt(totalElapsed);
    const doneDur=session.steps.slice(0,stepIdx).reduce((a,b)=>a+b.duration,0)+(session.steps[stepIdx].duration-stepRemain);
    document.getElementById('prog-fill').style.width=`${(doneDur/totalDur*100).toFixed(1)}%`;
    document.getElementById('prog-done').textContent=`${stepIdx+1} / ${session.steps.length} blocos`;
    updateTimer(Math.max(0,stepRemain),session.steps[stepIdx].duration);
    if(realSpeed>0){
      updatePaceIndicator(realSpeed,session.steps[stepIdx].speed);
      paceCheckSpeech(realSpeed,session.steps[stepIdx].speed);
    }
    if(stepRemain===5){
      alertWarn();
      warningBeforeSpeech(session.steps[stepIdx+1]||null);
    }
    if(stepRemain<=0){
      const ni=stepIdx+1;
      if(ni<session.steps.length){
        alertChange();showTransition(session.steps[ni]);
        setTimeout(()=>{loadStep(session,ni);setTimeout(()=>speak(stepSpeech(session.steps[ni])),300);},2000);
      } else finishWorkout(session);
    }
  },1000);
}

function showTransition(step){
  const o=document.getElementById('toverlay');
  document.getElementById('t-spd').textContent=step.speed.toFixed(1);
  document.getElementById('t-desc').textContent=
    step.intensity==='RECOVERY'?'km/h — RECUPERAÇÃO':
    step.intensity==='WARMUP'?'km/h — AQUECIMENTO':
    step.intensity==='COOLDOWN'?'km/h — ESFRIAMENTO':'km/h — VÁ!';
  o.classList.add('show');setTimeout(()=>o.classList.remove('show'),1800);
}

function stopWorkout(){
  if(!confirm('Parar o treino?'))return;
  clearInterval(timerIv);active=false;stopGPS();goHome();
}

function finishWorkout(session){
  clearInterval(timerIv);active=false;stopGPS();
  beep(523,.1);setTimeout(()=>beep(659,.1),150);setTimeout(()=>beep(784,.3),300);
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);
  document.getElementById('d-dur').textContent=fmt(totalElapsed);
  document.getElementById('d-dist').textContent=totalDist.toFixed(2);
  const avgPace=totalDist>0?totalElapsed/totalDist:0;
  document.getElementById('d-pace').textContent=avgPace>0?fmt(Math.round(avgPace)):'—';
  document.getElementById('d-week').textContent=`S${cWeek}`;
  speak('Treino concluído! Parabéns!', true);
  show('done');
}

function goHome(){clearInterval(timerIv);active=false;stopGPS();show('home')}


// ── SPEECH (Web Speech API → Bluetooth fone) ─────────────────────────────────
const SPEECH_LANG = 'pt-BR';
let speechEnabled = true;
let speechQueue = [];
let speaking = false;

function speak(text, priority=false) {
  if (!speechEnabled || !window.speechSynthesis) return;
  if (priority) speechQueue = [text];  // cancela fila, fala imediatamente
  else speechQueue.push(text);
  if (!speaking) processQueue();
}

function processQueue() {
  if (!speechQueue.length) { speaking = false; return; }
  speaking = true;
  const text = speechQueue.shift();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = SPEECH_LANG;
  utt.rate = 1.05;
  utt.pitch = 1.0;
  utt.volume = 1.0;
  utt.onend = () => setTimeout(processQueue, 200);
  utt.onerror = () => { speaking = false; processQueue(); };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

// Descrição falada de cada step
function stepSpeech(step) {
  const spd = step.speed.toFixed(1).replace('.', ',');
  const dur = step.duration;
  const mins = Math.floor(dur / 60);
  const secs = dur % 60;
  const durStr = mins > 0
    ? (secs > 0 ? `${mins} minuto${mins>1?'s':''} e ${secs} segundos` : `${mins} minuto${mins>1?'s':''}`)
    : `${secs} segundos`;

  const intMap = {
    WARMUP:   `Aquecimento. ${spd} quilômetros por hora. ${durStr}.`,
    COOLDOWN: `Esfriamento. ${spd} quilômetros por hora. ${durStr}.`,
    RECOVERY: `Recuperação. Baixe para ${spd} quilômetros por hora. ${durStr}.`,
    ACTIVE:   `Agora. ${spd} quilômetros por hora. ${durStr}.`,
  };
  return intMap[step.intensity] || `${spd} quilômetros por hora. ${durStr}.`;
}

// Aviso 5 segundos antes
function warningBeforeSpeech(nextStep) {
  if (!nextStep) {
    speak('Atenção. Treino terminando em cinco segundos.', true);
    return;
  }
  const spd = nextStep.speed.toFixed(1).replace('.', ',');
  const intMap = {
    WARMUP:   `Em cinco segundos, aquecimento. ${spd} quilômetros por hora.`,
    COOLDOWN: `Em cinco segundos, esfriamento. ${spd} quilômetros por hora.`,
    RECOVERY: `Em cinco segundos, recuperação. ${spd} quilômetros por hora.`,
    ACTIVE:   `Em cinco segundos, ${spd} quilômetros por hora.`,
  };
  speak(intMap[nextStep.intensity] || `Em cinco segundos, ${spd} quilômetros por hora.`, true);
}

// Avisos periódicos de pace durante o bloco
let lastPaceAlert = 0;
function paceCheckSpeech(realSpd, tgtSpd) {
  if (!active || tgtSpd === 0 || !speechEnabled) return;
  const now = Date.now();
  if (now - lastPaceAlert < 20000) return; // no máximo 1 aviso a cada 20seg
  const diff = realSpd - tgtSpd;
  if (realSpd < 0.5) return; // parado, não fala
  if (Math.abs(diff) > 1.2) {
    lastPaceAlert = now;
    if (diff > 0) speak(`Você está rápido demais. Reduza para ${tgtSpd.toFixed(1).replace('.',',')} quilômetros por hora.`);
    else          speak(`Você está lento demais. Acelere para ${tgtSpd.toFixed(1).replace('.',',')} quilômetros por hora.`);
  }
}

// Speech toggle button (add to workout header area)
function addSpeechToggle() {
  const btn = document.createElement('button');
  btn.id = 'speech-toggle';
  btn.style.cssText = `
    position:fixed;bottom:32px;right:20px;z-index:50;
    background:#0f2318;border:1px solid #1a3a22;border-radius:50%;
    width:48px;height:48px;font-size:20px;cursor:pointer;
    display:none;align-items:center;justify-content:center;
    box-shadow:0 2px 12px rgba(0,0,0,.4);
  `;
  btn.textContent = '🔊';
  btn.title = 'Ativar/desativar voz';
  btn.onclick = () => {
    speechEnabled = !speechEnabled;
    btn.textContent = speechEnabled ? '🔊' : '🔇';
    btn.style.borderColor = speechEnabled ? '#76B746' : '#e05040';
    if (speechEnabled) speak('Voz ativada.');
    else window.speechSynthesis.cancel();
  };
  document.body.appendChild(btn);
  document.getElementById('workout').addEventListener('transitionend', () => {});
  // Show when workout screen is active
  const observer = new MutationObserver(() => {
    btn.style.display = document.getElementById('workout').classList.contains('active') ? 'flex' : 'none';
  });
  observer.observe(document.getElementById('workout'), {attributes:true, attributeFilter:['class']});
}

// ── PWA INSTALL BANNER ────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = `
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:#0f2318;border-top:1px solid #76B746;
    padding:14px 20px;display:flex;align-items:center;gap:12px;
    font-family:'DM Sans',sans-serif;
  `;
  banner.innerHTML = `
    <div style="flex:1">
      <div style="font-weight:600;font-size:14px;color:#f0f5f1">Instalar COACH</div>
      <div style="font-size:12px;color:#4a6a52;margin-top:2px">Adicionar à tela inicial como app</div>
    </div>
    <button onclick="installPWA()" style="background:#76B746;color:#0a1a10;border:none;border-radius:8px;padding:10px 18px;font-weight:600;font-size:13px;cursor:pointer">INSTALAR</button>
    <button onclick="document.getElementById('install-banner').remove()" style="background:none;border:none;color:#4a6a52;font-size:20px;cursor:pointer;padding:4px">×</button>
  `;
  document.body.appendChild(banner);
}

async function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  const banner = document.getElementById('install-banner');
  if (banner) banner.remove();
  if (outcome === 'accepted') speak('App instalado com sucesso!');
}

// Show install tip whenever not in standalone mode
window.addEventListener('load', () => {
  setTimeout(() => {
    const isStandalone = window.navigator.standalone ||
      window.matchMedia('(display-mode: standalone)').matches;
    if (isStandalone) return;
    if (!deferredPrompt) showManualInstallTip();
  }, 2000);
});

function showManualInstallTip() {
  if (document.getElementById('install-banner')) return;
  if (document.getElementById('manual-tip')) return;
  const tip = document.createElement('div');
  tip.id = 'manual-tip';
  tip.style.cssText = `

    background:#0f2318;border-top:1px solid #3A6B1F;
    padding:14px 20px;display:flex;align-items:center;gap:12px;

  `;
  tip.innerHTML = `
    <div style="flex:1">
      <div style="font-weight:600;font-size:13px;color:#f0f5f1">Instalar como app</div>
      <div style="font-size:11px;color:#4a6a52;margin-top:3px;line-height:1.4">

    </div>
    <button onclick="document.getElementById('manual-tip').remove()" style="background:none;border:none;color:#4a6a52;font-size:20px;cursor:pointer;padding:4px">×</button>
  `;
  document.body.appendChild(tip);
}
